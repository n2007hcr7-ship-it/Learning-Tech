<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جمالك - متجر التجميل والعطور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .hero-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .cart-badge {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4 space-x-reverse">
                    <h1 class="text-3xl font-bold text-purple-600">💄 جمالك</h1>
                    <span class="text-gray-600">متجر التجميل والعطور</span>
                </div>
                
                <nav class="hidden md:flex space-x-8 space-x-reverse">
                    <a href="#home" class="text-gray-700 hover:text-purple-600 transition-colors">الرئيسية</a>
                    <a href="#products" class="text-gray-700 hover:text-purple-600 transition-colors">المنتجات</a>
                    <a href="#about" class="text-gray-700 hover:text-purple-600 transition-colors">من نحن</a>
                    <a href="#contact" class="text-gray-700 hover:text-purple-600 transition-colors">اتصل بنا</a>
                </nav>
                
                <div class="flex items-center space-x-4 space-x-reverse">
                    <button onclick="toggleCart()" class="relative bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition-colors">
                        🛒 السلة
                        <span id="cartCount" class="cart-badge absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section id="home" class="hero-gradient text-white py-20">
        <div class="container mx-auto px-4 text-center">
            <h2 class="text-5xl font-bold mb-6">اكتشفي جمالك الطبيعي</h2>
            <p class="text-xl mb-8 max-w-2xl mx-auto">مجموعة متميزة من أفضل منتجات التجميل والعطور العالمية بأسعار مناسبة</p>
            <button onclick="scrollToProducts()" class="bg-white text-purple-600 px-8 py-3 rounded-full font-semibold hover:bg-gray-100 transition-colors">
                تسوقي الآن
            </button>
        </div>
    </section>

    <!-- Categories -->
    <section class="py-16 bg-white">
        <div class="container mx-auto px-4">
            <h3 class="text-3xl font-bold text-center mb-12 text-gray-800">فئات المنتجات</h3>
            <div class="grid md:grid-cols-3 gap-8">
                <div class="text-center p-6 rounded-lg bg-gradient-to-br from-pink-100 to-purple-100 hover:shadow-lg transition-shadow">
                    <div class="text-6xl mb-4">💄</div>
                    <h4 class="text-xl font-semibold mb-2">مكياج</h4>
                    <p class="text-gray-600">أحمر شفاه، كحل، ماسكارا وأكثر</p>
                </div>
                <div class="text-center p-6 rounded-lg bg-gradient-to-br from-blue-100 to-indigo-100 hover:shadow-lg transition-shadow">
                    <div class="text-6xl mb-4">🌸</div>
                    <h4 class="text-xl font-semibold mb-2">عطور</h4>
                    <p class="text-gray-600">عطور فاخرة للنساء والرجال</p>
                </div>
                <div class="text-center p-6 rounded-lg bg-gradient-to-br from-green-100 to-teal-100 hover:shadow-lg transition-shadow">
                    <div class="text-6xl mb-4">🧴</div>
                    <h4 class="text-xl font-semibold mb-2">العناية بالبشرة</h4>
                    <p class="text-gray-600">كريمات ومرطبات طبيعية</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Products -->
    <section id="products" class="py-16 bg-gray-50">
        <div class="container mx-auto px-4">
            <h3 class="text-3xl font-bold text-center mb-12 text-gray-800">منتجاتنا المميزة</h3>
            
            <!-- Filter Buttons -->
            <div class="flex justify-center mb-8 space-x-4 space-x-reverse">
                <button onclick="filterProducts('all')" class="filter-btn bg-purple-600 text-white px-6 py-2 rounded-full hover:bg-purple-700 transition-colors">الكل</button>
                <button onclick="filterProducts('makeup')" class="filter-btn bg-gray-200 text-gray-700 px-6 py-2 rounded-full hover:bg-gray-300 transition-colors">مكياج</button>
                <button onclick="filterProducts('perfume')" class="filter-btn bg-gray-200 text-gray-700 px-6 py-2 rounded-full hover:bg-gray-300 transition-colors">عطور</button>
                <button onclick="filterProducts('skincare')" class="filter-btn bg-gray-200 text-gray-700 px-6 py-2 rounded-full hover:bg-gray-300 transition-colors">العناية بالبشرة</button>
            </div>
            
            <div id="productsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <!-- Products will be populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- About Section -->
    <section id="about" class="py-16 bg-white">
        <div class="container mx-auto px-4">
            <div class="max-w-4xl mx-auto text-center">
                <h3 class="text-3xl font-bold mb-8 text-gray-800">من نحن</h3>
                <p class="text-lg text-gray-600 mb-6">
                    متجر جمالك هو وجهتك المثالية للحصول على أفضل منتجات التجميل والعطور. نحن نقدم مجموعة متنوعة من المنتجات عالية الجودة من أشهر العلامات التجارية العالمية.
                </p>
                <p class="text-lg text-gray-600">
                    نؤمن بأن كل امرأة تستحق أن تشعر بالجمال والثقة، لذلك نحرص على توفير منتجات آمنة وفعالة بأسعار مناسبة للجميع.
                </p>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="py-16 bg-gray-50">
        <div class="container mx-auto px-4">
            <h3 class="text-3xl font-bold text-center mb-12 text-gray-800">اتصل بنا</h3>
            <div class="grid md:grid-cols-2 gap-12 max-w-4xl mx-auto">
                <div>
                    <h4 class="text-xl font-semibold mb-6">معلومات التواصل</h4>
                    <div class="space-y-4">
                        <div class="flex items-center space-x-3 space-x-reverse">
                            <span class="text-2xl">📞</span>
                            <span>+966 50 123 4567</span>
                        </div>
                        <div class="flex items-center space-x-3 space-x-reverse">
                            <span class="text-2xl">📧</span>
                            <span>info@jamalak.com</span>
                        </div>
                        <div class="flex items-center space-x-3 space-x-reverse">
                            <span class="text-2xl">📍</span>
                            <span>الرياض، المملكة العربية السعودية</span>
                        </div>
                    </div>
                </div>
                <div>
                    <form onsubmit="submitContact(event)" class="space-y-4">
                        <input type="text" placeholder="الاسم" required class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500">
                        <input type="email" placeholder="البريد الإلكتروني" required class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500">
                        <textarea placeholder="الرسالة" rows="4" required class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500"></textarea>
                        <button type="submit" class="w-full bg-purple-600 text-white py-3 rounded-lg hover:bg-purple-700 transition-colors">
                            إرسال الرسالة
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-12">
        <div class="container mx-auto px-4">
            <div class="grid md:grid-cols-3 gap-8">
                <div>
                    <h4 class="text-xl font-semibold mb-4">💄 جمالك</h4>
                    <p class="text-gray-300">متجرك المفضل لمنتجات التجميل والعطور عالية الجودة</p>
                </div>
                <div>
                    <h4 class="text-xl font-semibold mb-4">روابط سريعة</h4>
                    <ul class="space-y-2 text-gray-300">
                        <li><a href="#home" class="hover:text-white transition-colors">الرئيسية</a></li>
                        <li><a href="#products" class="hover:text-white transition-colors">المنتجات</a></li>
                        <li><a href="#about" class="hover:text-white transition-colors">من نحن</a></li>
                        <li><a href="#contact" class="hover:text-white transition-colors">اتصل بنا</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="text-xl font-semibold mb-4">تابعينا</h4>
                    <div class="flex space-x-4 space-x-reverse">
                        <a href="#" class="text-2xl hover:text-purple-400 transition-colors">📘</a>
                        <a href="#" class="text-2xl hover:text-purple-400 transition-colors">📷</a>
                        <a href="#" class="text-2xl hover:text-purple-400 transition-colors">🐦</a>
                    </div>
                </div>
            </div>
            <div class="border-t border-gray-700 mt-8 pt-8 text-center text-gray-300">
                <p>&copy; 2024 جمالك. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </footer>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4 max-h-96 overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-semibold">سلة التسوق</h3>
                <button onclick="toggleCart()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
            </div>
            <div id="cartItems" class="space-y-4 mb-4">
                <!-- Cart items will be populated here -->
            </div>
            <div class="border-t pt-4">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-semibold">المجموع:</span>
                    <span id="cartTotal" class="font-bold text-lg">0 ريال</span>
                </div>
                <button onclick="checkout()" class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition-colors">
                    إتمام الشراء
                </button>
            </div>
        </div>
    </div>

    <script>
        // Products data
        const products = [
            {id: 1, name: 'أحمر شفاه مات', price: 85, category: 'makeup', image: '💄', description: 'أحمر شفاه طويل الثبات'},
            {id: 2, name: 'عطر الورد الفاخر', price: 250, category: 'perfume', image: '🌹', description: 'عطر نسائي برائحة الورد الطبيعي'},
            {id: 3, name: 'كريم مرطب للوجه', price: 120, category: 'skincare', image: '🧴', description: 'كريم مرطب طبيعي للبشرة الجافة'},
            {id: 4, name: 'ماسكارا مقاومة للماء', price: 95, category: 'makeup', image: '👁️', description: 'ماسكارا تدوم طوال اليوم'},
            {id: 5, name: 'عطر العود الملكي', price: 350, category: 'perfume', image: '🏺', description: 'عطر شرقي فاخر للرجال والنساء'},
            {id: 6, name: 'سيروم فيتامين سي', price: 180, category: 'skincare', image: '💧', description: 'سيروم مضاد للأكسدة ومشرق للبشرة'},
            {id: 7, name: 'بودرة مضغوطة', price: 110, category: 'makeup', image: '🎨', description: 'بودرة ناعمة لإطلالة مثالية'},
            {id: 8, name: 'عطر الياسمين', price: 200, category: 'perfume', image: '🌼', description: 'عطر زهري منعش ورقيق'},
        ];

        let cart = [];
        let currentFilter = 'all';

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            displayProducts();
            updateCartDisplay();
        });

        // Display products
        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            const filteredProducts = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);
            
            grid.innerHTML = filteredProducts.map(product => `
                <div class="product-card bg-white rounded-lg shadow-md overflow-hidden">
                    <div class="p-6 text-center">
                        <div class="text-6xl mb-4">${product.image}</div>
                        <h4 class="text-lg font-semibold mb-2">${product.name}</h4>
                        <p class="text-gray-600 mb-4">${product.description}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-xl font-bold text-purple-600">${product.price} ريال</span>
                            <button onclick="addToCart(${product.id})" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition-colors">
                                أضف للسلة
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Filter products
        function filterProducts(category) {
            currentFilter = category;
            displayProducts();
            
            // Update filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-purple-600', 'text-white');
                btn.classList.add('bg-gray-200', 'text-gray-700');
            });
            event.target.classList.remove('bg-gray-200', 'text-gray-700');
            event.target.classList.add('bg-purple-600', 'text-white');
        }

        // Add to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({...product, quantity: 1});
            }
            
            updateCartDisplay();
            
            // Show success message
            showMessage('تم إضافة المنتج للسلة بنجاح!', 'success');
        }

        // Update cart display
        function updateCartDisplay() {
            const cartCount = document.getElementById('cartCount');
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            cartCount.textContent = totalItems;
            cartTotal.textContent = totalPrice + ' ريال';
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="text-gray-500 text-center">السلة فارغة</p>';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded">
                        <div class="flex items-center space-x-3 space-x-reverse">
                            <span class="text-2xl">${item.image}</span>
                            <div>
                                <div class="font-medium">${item.name}</div>
                                <div class="text-sm text-gray-600">${item.price} ريال × ${item.quantity}</div>
                            </div>
                        </div>
                        <button onclick="removeFromCart(${item.id})" class="text-red-500 hover:text-red-700">
                            🗑️
                        </button>
                    </div>
                `).join('');
            }
        }

        // Remove from cart
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartDisplay();
        }

        // Toggle cart modal
        function toggleCart() {
            const modal = document.getElementById('cartModal');
            modal.classList.toggle('active');
        }

        // Checkout
        function checkout() {
            if (cart.length === 0) {
                showMessage('السلة فارغة!', 'error');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            showMessage(`تم إتمام الطلب بنجاح! المبلغ الإجمالي: ${total} ريال`, 'success');
            cart = [];
            updateCartDisplay();
            toggleCart();
        }

        // Submit contact form
        function submitContact(event) {
            event.preventDefault();
            showMessage('تم إرسال رسالتك بنجاح! سنتواصل معك قريباً.', 'success');
            event.target.reset();
        }

        // Scroll to products
        function scrollToProducts() {
            document.getElementById('products').scrollIntoView({behavior: 'smooth'});
        }

        // Show message
        function showMessage(message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `fixed top-4 right-4 p-4 rounded-lg text-white z-50 ${type === 'success' ? 'bg-green-500' : 'bg-red-500'}`;
            messageDiv.textContent = message;
            document.body.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }

        // Smooth scrolling for navigation links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({behavior: 'smooth'});
                }
            });
        });
    </script>
