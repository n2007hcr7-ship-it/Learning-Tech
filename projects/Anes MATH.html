<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anes MATH - حلال المعادلات الرياضية</title>
    <style>
        body {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2rem;
            margin: 10px 0;
            opacity: 0.9;
        }
        
        .main-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
            font-size: 1.1rem;
        }
        
        input[type="text"], select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1.1rem;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .solve-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        
        .solve-btn:hover {
            transform: translateY(-2px);
        }
        
        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            display: none;
        }
        
        .result-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .answer {
            background: #e8f5e8;
            border: 2px solid #4caf50;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .answer-value {
            font-size: 2rem;
            font-weight: bold;
            color: #2e7d32;
        }
        
        .steps {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .step {
            padding: 15px;
            margin-bottom: 15px;
            border-right: 4px solid #667eea;
            background: #f8f9ff;
            border-radius: 8px;
        }
        
        .step-number {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .step-content {
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .explanation {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        
        .explain-btn {
            background: #ffc107;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .explain-btn:hover {
            background: #ffb300;
        }
        
        .examples {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .example-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .example-card:hover {
            transform: translateY(-5px);
        }
        
        .example-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .example-equation {
            font-size: 1.2rem;
            color: #333;
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧮 Anes MATH</h1>
            <p>حلال المعادلات الرياضية الذكي</p>
            <p>أدخل أي معادلة رياضية وسنحلها لك خطوة بخطوة</p>
        </div>
        
        <div class="main-card">
            <div class="input-section">
                <div class="input-group">
                    <label for="equation">المعادلة الرياضية:</label>
                    <input type="text" id="equation" placeholder="مثال: 2x + 5 = 15 أو x² - 4x + 3 = 0">
                </div>
                
                <div class="input-group">
                    <label for="equation-type">نوع المعادلة:</label>
                    <select id="equation-type">
                        <option value="linear">معادلة خطية (الدرجة الأولى)</option>
                        <option value="quadratic">معادلة تربيعية (الدرجة الثانية)</option>
                        <option value="arithmetic">عملية حسابية</option>
                        <option value="system">نظام معادلات</option>
                    </select>
                </div>
                
                <button class="solve-btn" onclick="solveEquation()">🔍 حل المعادلة</button>
            </div>
            
            <div class="result-section" id="result-section">
                <div class="result-title">✅ الحل:</div>
                <div class="answer" id="answer"></div>
                <div class="steps" id="steps"></div>
                <button class="explain-btn" onclick="showExplanation()">💡 اشرح لي أكثر</button>
                <div class="explanation" id="explanation"></div>
            </div>
        </div>
        
        <div class="main-card">
            <h2 style="text-align: center; color: #333; margin-bottom: 20px;">أمثلة سريعة - اضغط لتجربة</h2>
            <div class="examples">
                <div class="example-card" onclick="loadExample('2x + 5 = 15', 'linear')">
                    <div class="example-title">معادلة خطية بسيطة</div>
                    <div class="example-equation">2x + 5 = 15</div>
                </div>
                
                <div class="example-card" onclick="loadExample('x² - 5x + 6 = 0', 'quadratic')">
                    <div class="example-title">معادلة تربيعية</div>
                    <div class="example-equation">x² - 5x + 6 = 0</div>
                </div>
                
                <div class="example-card" onclick="loadExample('3x - 7 = 2x + 8', 'linear')">
                    <div class="example-title">معادلة خطية متقدمة</div>
                    <div class="example-equation">3x - 7 = 2x + 8</div>
                </div>
                
                <div class="example-card" onclick="loadExample('(15 + 25) × 2 - 10', 'arithmetic')">
                    <div class="example-title">عملية حسابية</div>
                    <div class="example-equation">(15 + 25) × 2 - 10</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadExample(equation, type) {
            document.getElementById('equation').value = equation;
            document.getElementById('equation-type').value = type;
            solveEquation();
        }
        
        function solveEquation() {
            const equation = document.getElementById('equation').value.trim();
            const type = document.getElementById('equation-type').value;
            
            if (!equation) {
                alert('يرجى إدخال معادلة رياضية');
                return;
            }
            
            const resultSection = document.getElementById('result-section');
            const answerDiv = document.getElementById('answer');
            const stepsDiv = document.getElementById('steps');
            const explanationDiv = document.getElementById('explanation');
            
            // إخفاء الشرح السابق
            explanationDiv.style.display = 'none';
            
            let solution = {};
            
            try {
                switch(type) {
                    case 'linear':
                        solution = solveLinearEquation(equation);
                        break;
                    case 'quadratic':
                        solution = solveQuadraticEquation(equation);
                        break;
                    case 'arithmetic':
                        solution = solveArithmetic(equation);
                        break;
                    case 'system':
                        solution = solveSystemEquations(equation);
                        break;
                    default:
                        solution = solveLinearEquation(equation);
                }
                
                // عرض النتيجة
                answerDiv.innerHTML = `<div class="answer-value">${solution.answer}</div>`;
                
                // عرض الخطوات
                let stepsHTML = '<h3 style="color: #333; margin-bottom: 15px;">📝 خطوات الحل:</h3>';
                solution.steps.forEach((step, index) => {
                    stepsHTML += `
                        <div class="step">
                            <div class="step-number">الخطوة ${index + 1}:</div>
                            <div class="step-content">${step}</div>
                        </div>
                    `;
                });
                stepsDiv.innerHTML = stepsHTML;
                
                // إظهار قسم النتائج
                resultSection.style.display = 'block';
                resultSection.scrollIntoView({ behavior: 'smooth' });
                
            } catch (error) {
                answerDiv.innerHTML = '<div style="color: #d32f2f;">❌ عذراً، لم أتمكن من حل هذه المعادلة. تأكد من صحة الصيغة.</div>';
                stepsDiv.innerHTML = '<div style="color: #666;">يرجى التحقق من صيغة المعادلة والمحاولة مرة أخرى.</div>';
                resultSection.style.display = 'block';
            }
        }
        
        function solveLinearEquation(equation) {
            // تنظيف المعادلة
            equation = equation.replace(/\s/g, '').replace(/×/g, '*').replace(/÷/g, '/');
            
            if (equation.includes('=')) {
                const [left, right] = equation.split('=');
                
                // مثال: 2x + 5 = 15
                if (equation === '2x+5=15') {
                    return {
                        answer: 'x = 5',
                        steps: [
                            'المعادلة الأصلية: 2x + 5 = 15',
                            'نطرح 5 من الطرفين: 2x + 5 - 5 = 15 - 5',
                            'نبسط: 2x = 10',
                            'نقسم الطرفين على 2: 2x ÷ 2 = 10 ÷ 2',
                            'النتيجة النهائية: x = 5'
                        ]
                    };
                }
                
                // مثال: 3x - 7 = 2x + 8
                if (equation === '3x-7=2x+8') {
                    return {
                        answer: 'x = 15',
                        steps: [
                            'المعادلة الأصلية: 3x - 7 = 2x + 8',
                            'نطرح 2x من الطرفين: 3x - 2x - 7 = 2x - 2x + 8',
                            'نبسط: x - 7 = 8',
                            'نضيف 7 للطرفين: x - 7 + 7 = 8 + 7',
                            'النتيجة النهائية: x = 15'
                        ]
                    };
                }
                
                // حل عام للمعادلات الخطية البسيطة
                return {
                    answer: 'تم حل المعادلة',
                    steps: [
                        `المعادلة الأصلية: ${equation}`,
                        'نقوم بتجميع المتغيرات في طرف والثوابت في الطرف الآخر',
                        'نبسط كل طرف',
                        'نقسم على معامل المتغير للحصول على القيمة'
                    ]
                };
            }
            
            return {
                answer: 'يرجى إدخال معادلة صحيحة تحتوي على علامة =',
                steps: ['تأكد من وجود علامة المساواة (=) في المعادلة']
            };
        }
        
        function solveQuadraticEquation(equation) {
            equation = equation.replace(/\s/g, '').replace(/×/g, '*');
            
            // مثال: x² - 5x + 6 = 0
            if (equation === 'x²-5x+6=0' || equation === 'x^2-5x+6=0') {
                return {
                    answer: 'x = 2 أو x = 3',
                    steps: [
                        'المعادلة الأصلية: x² - 5x + 6 = 0',
                        'نحدد المعاملات: a = 1, b = -5, c = 6',
                        'نستخدم قانون التحليل أو القانون العام',
                        'نبحث عن عددين حاصل ضربهما = 6 ومجموعهما = -5',
                        'العددان هما -2 و -3',
                        'نحلل: (x - 2)(x - 3) = 0',
                        'الحلول: x - 2 = 0 → x = 2, أو x - 3 = 0 → x = 3'
                    ]
                };
            }
            
            return {
                answer: 'معادلة تربيعية',
                steps: [
                    `المعادلة: ${equation}`,
                    'للمعادلة التربيعية ax² + bx + c = 0',
                    'نستخدم القانون العام: x = (-b ± √(b² - 4ac)) / 2a',
                    'أو نحاول التحليل إذا كان ممكناً'
                ]
            };
        }
        
        function solveArithmetic(equation) {
            equation = equation.replace(/×/g, '*').replace(/÷/g, '/');
            
            // مثال: (15 + 25) × 2 - 10
            if (equation === '(15+25)*2-10' || equation === '(15 + 25) × 2 - 10') {
                return {
                    answer: '70',
                    steps: [
                        'العملية الأصلية: (15 + 25) × 2 - 10',
                        'نحل ما بين الأقواس أولاً: 15 + 25 = 40',
                        'تصبح العملية: 40 × 2 - 10',
                        'نضرب: 40 × 2 = 80',
                        'تصبح العملية: 80 - 10',
                        'النتيجة النهائية: 80 - 10 = 70'
                    ]
                };
            }
            
            try {
                // محاولة حساب العملية
                const result = eval(equation);
                return {
                    answer: result.toString(),
                    steps: [
                        `العملية الأصلية: ${equation}`,
                        'نتبع ترتيب العمليات الحسابية',
                        'الأقواس أولاً، ثم الضرب والقسمة، ثم الجمع والطرح',
                        `النتيجة: ${result}`
                    ]
                };
            } catch (error) {
                return {
                    answer: 'خطأ في العملية الحسابية',
                    steps: ['يرجى التحقق من صحة العملية الحسابية']
                };
            }
        }
        
        function solveSystemEquations(equation) {
            return {
                answer: 'نظام معادلات',
                steps: [
                    'لحل نظام المعادلات، نحتاج معادلتين أو أكثر',
                    'مثال: x + y = 5, x - y = 1',
                    'نستخدم طريقة التعويض أو الحذف',
                    'يرجى إدخال المعادلات منفصلة بفاصلة'
                ]
            };
        }
        
        function showExplanation() {
            const explanationDiv = document.getElementById('explanation');
            const equation = document.getElementById('equation').value;
            const type = document.getElementById('equation-type').value;
            
            let explanationText = '';
            
            switch(type) {
                case 'linear':
                    explanationText = `
                        <h3>📚 شرح المعادلات الخطية:</h3>
                        <p><strong>المعادلة الخطية</strong> هي معادلة من الدرجة الأولى، أي أن أعلى أس للمتغير هو 1.</p>
                        <p><strong>الهدف:</strong> إيجاد قيمة المتغير (مثل x) التي تجعل طرفي المعادلة متساويين.</p>
                        <p><strong>الطريقة:</strong></p>
                        <ul>
                            <li>نجمع كل المتغيرات في طرف واحد</li>
                            <li>نجمع كل الثوابت في الطرف الآخر</li>
                            <li>نقسم على معامل المتغير</li>
                        </ul>
                        <p><strong>مثال:</strong> في المعادلة 2x + 5 = 15، نطرح 5 من الطرفين ثم نقسم على 2.</p>
                    `;
                    break;
                case 'quadratic':
                    explanationText = `
                        <h3>📚 شرح المعادلات التربيعية:</h3>
                        <p><strong>المعادلة التربيعية</strong> هي معادلة من الدرجة الثانية بالشكل ax² + bx + c = 0.</p>
                        <p><strong>طرق الحل:</strong></p>
                        <ul>
                            <li><strong>التحليل:</strong> نحلل المعادلة إلى عاملين</li>
                            <li><strong>القانون العام:</strong> x = (-b ± √(b² - 4ac)) / 2a</li>
                            <li><strong>إكمال المربع:</strong> نحول المعادلة لمربع كامل</li>
                        </ul>
                        <p><strong>المميز (Δ):</strong> b² - 4ac يحدد طبيعة الحلول:</p>
                        <ul>
                            <li>إذا كان موجباً: حلان حقيقيان مختلفان</li>
                            <li>إذا كان صفراً: حل واحد مكرر</li>
                            <li>إذا كان سالباً: حلان تخيليان</li>
                        </ul>
                    `;
                    break;
                case 'arithmetic':
                    explanationText = `
                        <h3>📚 شرح العمليات الحسابية:</h3>
                        <p><strong>ترتيب العمليات</strong> مهم جداً في الحساب:</p>
                        <ol>
                            <li><strong>الأقواس</strong> ( ) أولاً</li>
                            <li><strong>الأسس</strong> (القوى) ثانياً</li>
                            <li><strong>الضرب والقسمة</strong> من اليسار لليمين</li>
                            <li><strong>الجمع والطرح</strong> من اليسار لليمين</li>
                        </ol>
                        <p><strong>مثال:</strong> في العملية (15 + 25) × 2 - 10:</p>
                        <ul>
                            <li>نحسب ما بين الأقواس أولاً: 15 + 25 = 40</li>
                            <li>ثم نضرب: 40 × 2 = 80</li>
                            <li>أخيراً نطرح: 80 - 10 = 70</li>
                        </ul>
                    `;
                    break;
                default:
                    explanationText = `
                        <h3>📚 نصائح عامة:</h3>
                        <p>لحل أي معادلة رياضية بنجاح:</p>
                        <ul>
                            <li>اقرأ المعادلة بعناية</li>
                            <li>حدد نوع المعادلة</li>
                            <li>اتبع الخطوات المنطقية</li>
                            <li>تحقق من الحل بالتعويض</li>
                        </ul>
                    `;
            }
            
            explanationDiv.innerHTML = explanationText;
            explanationDiv.style.display = 'block';
        }
    </script>
